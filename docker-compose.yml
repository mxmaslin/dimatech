services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dimatech
      POSTGRES_PASSWORD: dimatech
      POSTGRES_DB: dimatech
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dimatech"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://dimatech:dimatech@db:5432/dimatech"
    ports:
      - "8000:8000"
    volumes:
      - ./migrations:/app/migrations
      - ./src:/app/src

volumes:
  pgdata:
